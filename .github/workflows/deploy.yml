name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vite build --base "/${{ github.event.repository.name }}/"

      - name: Create index.html for static hosting
        run: |
          cd ./dist/client
          JS_FILE=$(ls assets/*.js | head -1)
          CSS_FILE=$(ls assets/*.css | head -1)
          cat > index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Biodata PDF Generator</title>
              <link rel="stylesheet" href="$CSS_FILE">
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="$JS_FILE"></script>
            </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/client


